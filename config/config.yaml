testing:
  sampling:
    measurements_count: 10
    total_duration_seconds: 10
    sampling_frequency_hz: 1.0

ammeters:
  greenlee:
    port: 5001
    command: "MEASURE_GREENLEE -get_measurement"
  entes:
    port: 5002
    command: "MEASURE_ENTES -get_data"
  circutor:
    port: 5003
    command: "MEASURE_CIRCUTOR -get_measurement -current"

analysis:
  statistical_metrics:
    - mean
    - median
    - std_dev
    - min
    - max
  visualization:
    enabled: true
    plot_types:
      - time_series
      - histogram

result_management:
  output_dir: results/data
  format: json

error_simulation:
  enabled: false
  drop_rate: 0.1        # probability of a measurement returning None
  outlier_rate: 0.1     # probability of a wildly wrong value
  outlier_factor: 10.0  # how many times the real value the outlier will be
  exception_rate: 0.05  # probability of a simulated connection error
